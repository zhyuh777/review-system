<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>电工电子技术 · 复习系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#1e293b;padding-bottom:90px}
.login{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:#f5f7fa;padding:20px}
.login.hide{display:none}
.lb{background:#fff;border-radius:24px;padding:40px 32px;width:100%;max-width:360px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.06)}
.lb h1{font-size:24px;font-weight:700;margin-bottom:4px}
.lb p{font-size:14px;color:#64748b;margin-bottom:28px}
.lb input{width:100%;padding:14px 16px;border:1.5px solid #e2e8f0;border-radius:12px;font-size:15px;margin-bottom:12px;outline:none}
.lb input:focus{border-color:#2563eb}
.lb button{width:100%;padding:14px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.lb .err{color:#dc2626;font-size:12px;margin-top:10px;display:none}
.app{max-width:76vw;margin:0 auto;padding:24px 40px 0;display:none}
.app.s{display:block}
.hd{display:flex;justify-content:space-between;align-items:flex-end;padding:4px 0 20px;margin-bottom:20px;border-bottom:1px solid #e2e8f0}
.hd .tt{font-size:28px;font-weight:800}
.hd .info{font-size:13px;color:#64748b}
.card{background:#fff;border-radius:16px;padding:24px 28px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.h3{font-size:15px;font-weight:600;color:#64748b;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.g4{background:#fff;border-radius:16px;padding:24px 16px;text-align:center}
.g4 .n{font-size:32px;font-weight:800}
.g4 .l{font-size:12px;color:#64748b;margin-top:4px}
.bar{height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden;margin:6px 0 12px}
.bf{height:100%;border-radius:5px;transition:width .6s}
.leg{display:flex;justify-content:space-between;font-size:10px;color:#64748b}
.pr{display:flex;align-items:center;gap:12px;padding:10px 0;font-size:14px}
.pr+.pr{border-top:1px solid #f1f5f9}
.pr .tr{flex:1;height:7px;background:#e5e7eb;border-radius:4px;overflow:hidden}
.pr .fl{height:100%;border-radius:4px;transition:width .5s}
.pr .pct{font-weight:600;min-width:36px;text-align:right;font-size:13px}
.pr .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mc{padding:24px 14px;background:#fff;border-radius:16px;text-align:center;cursor:pointer;transition:all .12s}
.mc:active{transform:scale(.97)}
.mc .mi{font-size:30px;margin-bottom:8px;display:block}
.mc .mn{font-size:14px;font-weight:600}
.qw{background:#fff;border-radius:16px;padding:24px}
.qm{display:flex;justify-content:space-between;margin-bottom:14px;font-size:12px;color:#64748b}
.qt{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.qtc{background:#eff6ff;color:#2563eb}
.qtt{background:#fef3c7;color:#d97706}
.qtf{background:#f3e8ff;color:#7c3aed}
.qtp{background:#fce4ec;color:#dc2626}
.qts{background:#fce7f3;color:#db2777}
.qtx{font-size:16px;line-height:1.7;margin-bottom:18px}
.qimg{max-width:100%;margin:8px 0;border-radius:8px;border:1px solid #e2e8f0;display:block}
.qo{display:flex;align-items:center;gap:10px;padding:13px 16px;border:1.5px solid #e2e8f0;border-radius:10px;margin-bottom:6px;cursor:pointer}
.qo .lt{width:28px;height:28px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#64748b;flex-shrink:0}
.qo.sel{border-color:#2563eb;background:#eff6ff}
.qo.sel .lt{background:#2563eb;color:#fff}
.qo.ok{border-color:#16a34a;background:#f0fdf4}
.qo.ok .lt{background:#16a34a;color:#fff}
.qo.no{border-color:#dc2626;background:#fef2f2}
.qo.no .lt{background:#dc2626;color:#fff}
.tfb{flex:1;padding:15px;border:1.5px solid #e2e8f0;border-radius:10px;text-align:center;cursor:pointer;font-size:14px;font-weight:600}
.tfb.st{border-color:#16a34a;color:#16a34a;background:#f0fdf4}
.tfb.sf{border-color:#dc2626;color:#dc2626;background:#fef2f2}
.inp{width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none;margin-bottom:8px}
.inp:focus{border-color:#2563eb}
.res{padding:14px 18px;border-radius:10px;font-size:15px;display:none;margin-bottom:8px}
.res.s{display:block}
.res.good{background:#f0fdf4;color:#16a34a}
.res.bad{background:#fef2f2;color:#dc2626}
.btns{display:flex;gap:8px;padding:6px 0 2px}
.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.bp{background:#2563eb;color:#fff}
.bo{background:transparent;border:1.5px solid #e2e8f0}
.bs{background:#16a34a;color:#fff}
.be{background:#dc2626;color:#fff}
.nd{display:flex;gap:4px;justify-content:center;padding:10px 0 2px;flex-wrap:wrap}
.nd-d{width:10px;height:10px;border-radius:50%;background:#d1d5db;cursor:pointer;flex-shrink:0}
.nd-d.cu{border:2px solid #2563eb;background:#2563eb;transform:scale(1.3)}
.nd-d.ok{background:#16a34a}
.nd-d.no{background:#dc2626}
.tab{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);max-width:560px;width:92%;background:#fff;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,.08);display:flex;padding:4px;z-index:100}
.ti{flex:1;text-align:center;padding:14px 0;cursor:pointer;font-size:15px;font-weight:600;color:#64748b;border-radius:16px}
.ti.a{background:#2563eb;color:#fff}
.pg{display:none}
.pg.a{display:block}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200;align-items:flex-end;justify-content:center}
.mo.s{display:flex}
.ms{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:70vh;overflow:hidden;display:flex;flex-direction:column}
.mh{padding:16px 20px;border-bottom:1px solid #e2e8f0;font-size:16px;font-weight:600;display:flex;justify-content:space-between}
.mb{padding:8px 20px 14px;overflow-y:auto;flex:1}
.mf{padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;gap:8px;justify-content:flex-end}
.cs{display:flex;align-items:center;gap:10px;padding:12px 0;cursor:pointer}
.cs+.cs{border-top:1px solid #f1f5f9}
.cbx{width:20px;height:20px;border:2px solid #d1d5db;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cbx.on{background:#2563eb;border-color:#2563eb}
.cbx.on::after{content:"✓";color:#fff;font-size:11px;font-weight:700}
.sr{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-size:14px}
.sr+.sr{border-top:1px solid #f1f5f9}
.sgg{display:flex;gap:4px;background:#f1f5f9;border-radius:8px;padding:3px}
.sgg span{padding:6px 14px;border-radius:7px;font-size:12px;cursor:pointer}
.sgg span.a{background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.sb{padding:6px 16px;border-radius:8px;border:1px solid #dc2626;background:transparent;color:#dc2626;font-size:12px;cursor:pointer}
.sb.bl{border-color:#2563eb;color:#2563eb}
@media(max-width:600px){.grid4{grid-template-columns:repeat(2,1fr)}.mg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="login" id="lp">
  <div class="lb">
    <h1>电工电子技术</h1>
    <p>复习系统</p>
    <input id="si" placeholder="学号">
    <input id="sn" placeholder="姓名">
    <button id="lbtn">进入系统</button>
    <div class="err" id="le">请填写学号和姓名</div>
  </div>
</div>

<div class="app" id="app">
  <div class="pg a" id="p0">
    <div class="hd"><div class="tt">数据看板</div><div class="info"><span id="dt"></span></div></div>
    <div class="grid4" id="g1"></div>
    <div class="card"><div class="h3">总体掌握度</div><div id="ov"></div></div>
    <div class="card"><div class="h3">各章节</div><div id="ch"></div></div>
    <div class="card"><div class="h3">各题型</div><div id="tp"></div></div>
    <div class="card"><div class="h3">练习记录</div><div id="sr"></div></div>
  </div>

  <div class="pg" id="p1">
    <div class="hd"><div class="tt">练习中心</div><div class="info" id="ps"></div></div>
    <div id="mArea"><div class="mg" id="mg"></div></div>
    <div id="qa" style="display:none"></div>
  </div>

  <div class="pg" id="p2">
    <div class="hd"><div class="tt">设置</div></div>
    <div class="card">
      <div class="sr"><span>当前用户</span><button class="sb" onclick="lo()">切换</button></div>
      <div class="sr"><span>重置进度</span><button class="sb" onclick="rst()">重置</button></div>
      <div class="sr"><span>导出</span><button class="sb bl" onclick="exp()">导出</button></div>
      <div class="sr"><span>导入</span><button class="sb bl" onclick="document.getElementById('fi').click()">导入</button><input type="file" id="fi" accept=".json" style="display:none"></div>
    </div>
    <div class="card">
      <div class="sr"><span>每轮题数</span><div class="sgg" id="sz"></div></div>
      <div class="sr"><span>自动下一题</span><div class="sgg" id="au"></div></div>
      <div style="text-align:center;margin-top:10px;font-size:12px;color:#64748b" id="infoBar"></div>
    </div>
  </div>
</div>

<div class="tab">
  <div class="ti a" data-t="0">看板</div>
  <div class="ti" data-t="1">练习</div>
  <div class="ti" data-t="2">设置</div>
</div>

<div class="mo" id="m1" onclick="cx(1)">
  <div class="ms" onclick="event.stopPropagation()">
    <div class="mh"><span>选择章节</span><span style="cursor:pointer;font-size:20px;color:#64748b" onclick="cx(1)">✕</span></div>
    <div class="mb" id="m1b"></div>
    <div class="mf"><button class="btn bo" onclick="cx(1)">取消</button><button class="btn bp" id="m1g">开始</button></div>
  </div>
</div>

<div class="mo" id="m2" onclick="cx(2)">
  <div class="ms" onclick="event.stopPropagation()">
    <div class="mh"><span>选择题型</span><span style="cursor:pointer;font-size:20px;color:#64748b" onclick="cx(2)">✕</span></div>
    <div class="mb" id="m2b"></div>
    <div class="mf"><button class="btn bo" onclick="cx(2)">取消</button><button class="btn bp" id="m2g">开始</button></div>
  </div>
</div>

<script>
var QB=__QB_DATA__;

var CHS=["电路基本概念","电路分析方法","交流电路","安全用电","半导体器件"];
var TN={choice:"选择题",tf:"判断题",fill:"填空题",calc:"计算题",analysis:"分析题"};
var TY={choice:"c",tf:"t",fill:"f",calc:"p",analysis:"s"};
var U="",N="",A={},H=[],Q=[],I=0,C=null,MD="",CR={},S={size:20,auto:false},TM=null,SC={},ST={};

try{var _s=JSON.parse(localStorage.getItem("_s")||"{}");if(_s.size!==undefined)S.size=_s.size;if(_s.auto!==undefined)S.auto=_s.auto}catch(e){}

(function(){
  try{var s=localStorage.getItem("_ul");if(s){var d=JSON.parse(s);if(d.u&&d.n){U=d.u;N=d.n;go()}}}catch(e){}
})();

document.getElementById("lbtn").onclick=function(){
  var i=document.getElementById("si").value.trim(),n=document.getElementById("sn").value.trim();
  if(!i||!n){document.getElementById("le").style.display="block";return}
  document.getElementById("le").style.display="none";U=i;N=n;
  try{localStorage.setItem("_ul",JSON.stringify({u:U,n:N}))}catch(e){}go();
};

function go(){
  document.getElementById("lp").classList.add("hide");
  document.getElementById("app").classList.add("s");
  try{var p=JSON.parse(localStorage.getItem("_d"+U)||"{}");Object.keys(p).forEach(function(k){if(p[k].a>0)A[k]=true})}catch(e){}
  H=[];try{var hs=localStorage.getItem("_his"+U);if(hs)H=JSON.parse(hs);if(!Array.isArray(H))H=[]}catch(e){H=[]}
  rd();ins();
}

function lo(){
  if(!confirm("切换用户？"))return;
  U="";N="";A={};H=[];
  document.getElementById("app").classList.remove("s");
  document.getElementById("lp").classList.remove("hide");
  document.getElementById("si").value="";document.getElementById("sn").value="";
}

function ld(){try{return JSON.parse(localStorage.getItem("_d"+U)||"{}")}catch(e){return{}}}
function sv(d){try{localStorage.setItem("_d"+U,JSON.stringify(d))}catch(e){}}
function rc(id){var p=ld();return p[id]||{a:0,c:0,lc:false,r5:[],f:false}}
function sr(id,r){var p=ld();p[id]=r;sv(p)}
function ms(id){
  var r=rc(id);if(r.a===0)return 0;
  var f=r.f?100:0;
  var re=r.r5.length>0?r.r5.filter(Boolean).length/r.r5.length*100:0;
  var pn=Math.max(0,(r.a-5)*3);
  return Math.max(0,Math.min(100,Math.round(.4*f+.5*re-.1*pn)));
}
function ml(m){if(m<=20)return 1;if(m<=40)return 2;if(m<=60)return 3;if(m<=70)return 4;return 5}
function mc(m){return["#d32f2f","#ef6c00","#fbc02d","#7cb342","#2e7d32"][ml(m)-1]||"#ddd"}
function mb(m){return["未掌握","需加强","一般","良好","掌握"][ml(m)-1]||"未做"}
function ra(id,ok){
  var r=rc(id);r.a++;if(ok){r.c++;r.lc=true}else{r.lc=false}
  if(r.a===1)r.f=ok;r.r5.push(ok);if(r.r5.length>5)r.r5.shift();sr(id,r);A[id]=true;CR[id]=true;
}
function es(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function sh(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function chM(ch){var qs=QB.filter(function(q){return q.ch===ch});if(!qs.length)return 0;var s=0;qs.forEach(function(q){s+=ms(q.id)});return Math.round(s/qs.length)}
function tpS(t){var qs=QB.filter(function(q){return q.type===t});var d=0;qs.forEach(function(q){if(ms(q.id)>0)d++});return{t:qs.length,d:d}}
function st(){var t=QB.length,d=0,s=0;QB.forEach(function(q){var m=ms(q.id);if(m>0)d++;s+=m});return{t:t,d:d,m:t?Math.round(s/t):0}}

function rd(){
  var d=new Date();document.getElementById("dt").textContent=d.getFullYear()+"."+(d.getMonth()+1)+"."+d.getDate();var s=st();
  document.getElementById("g1").innerHTML='<div class="g4"><div class="n" style="color:#2563eb">'+s.t+'</div><div class="l">总题库</div></div><div class="g4"><div class="n" style="color:#7c3aed">'+s.d+'</div><div class="l">已完成</div></div><div class="g4"><div class="n" style="color:#16a34a">'+s.m+'%</div><div class="l">掌握度</div></div><div class="g4"><div class="n" style="color:#d97706">'+(s.t-s.d)+'</div><div class="l">待攻克</div></div>';
  document.getElementById("ov").innerHTML='<div style="display:flex;justify-content:space-between;font-size:13px"><span>'+mb(s.m)+'</span><span style="font-weight:700">'+s.m+'%</span></div><div class="bar"><div class="bf" style="width:'+s.m+'%;background:'+mc(s.m)+'"></div></div><div class="leg"><span>●未掌握</span><span>●需加强</span><span>●一般</span><span>●良好</span><span>●掌握</span></div>';
  var h="";CHS.forEach(function(ch){var m=chM(ch);h+='<div class="pr"><span class="dot" style="background:'+mc(m)+'"></span><span style="flex:0 0 90px">'+ch+'</span><div class="tr"><div class="fl" style="width:'+m+'%;background:'+mc(m)+'"></div></div><span class="pct" style="color:'+mc(m)+'">'+m+'%</span></div>'});document.getElementById("ch").innerHTML=h;
  var th="";["choice","tf","fill","calc","analysis"].forEach(function(t){var st=tpS(t);var p=st.t?Math.round(st.d/st.t*100):0;th+='<div class="pr"><span style="flex:0 0 50px;font-size:12px;color:#64748b">'+(TN[t]||t)+'</span><span style="font-size:11px;color:#64748b;flex:0 0 44px">'+st.d+'/'+st.t+'</span><div class="tr"><div class="fl" style="width:'+p+'%;background:#2563eb"></div></div><span class="pct" style="color:#2563eb">'+p+'%</span></div>'});document.getElementById("tp").innerHTML=th;
  document.getElementById("ps").textContent="已答 "+s.d+"/"+s.t+" 题";
  document.getElementById("infoBar").textContent=QB.length+"题 · "+CHS.length+"章 · "+Object.keys(TN).length+"题型";
  var rH="";if(H&&H.length){var ms={};H.forEach(function(x){if(!ms[x.md])ms[x.md]={t:0,c:0};ms[x.md].t+=x.t;ms[x.md].c+=x.c});var mm={0:"随机",1:"顺序",2:"错题",3:"薄弱",4:"章节",5:"题型"};for(var k in ms){var r=ms[k].t?Math.round(ms[k].c/ms[k].t*100):0;rH+='<div class="g4" style="display:inline-block;margin:4px;min-width:120px"><div class="n" style="font-size:24px;color:'+(r>=80?"#16a34a":r>=60?"#2563eb":r>=40?"#d97706":"#dc2626")+'">'+r+'%</div><div class="l">'+(mm[k]||k)+' ('+ms[k].c+'/'+ms[k].t+')</div></div>'}}document.getElementById("sr").innerHTML=rH||'<div style="color:#64748b;text-align:center;padding:12px">暂无练习记录</div>';
}

function sm(m){
  if(typeof m==="string"&&!isNaN(m))m=Number(m);
  var p=[],sz=S.size>0?S.size:QB.length;
  if(m==="chapter"){scs();return}
  if(m==="type"){sts();return}
  if(typeof m==="number"){
    if(m===0){["choice","tf","fill","calc","analysis"].forEach(function(t){var pool=QB.filter(function(q){return q.type===t});sh(pool);p=p.concat(pool.slice(0,Math.ceil(sz/5)))});sh(p);if(sz>0&&p.length>sz)p=p.slice(0,sz)}
    else if(m===1){["choice","tf","fill","calc","analysis"].forEach(function(t){QB.filter(function(q){return q.type===t}).slice(0,Math.ceil(sz/5)).forEach(function(q){p.push(q)})});if(sz>0&&p.length>sz)p=p.slice(0,sz)}
    else if(m===2){p=QB.filter(function(q){var r=rc(q.id);return r.a>0&&!r.lc});sh(p);if(sz>0&&p.length>sz)p=p.slice(0,sz)}
    else if(m===3){p=QB.slice().sort(function(a,b){return ms(a.id)-ms(b.id)});if(sz>0&&p.length>sz)p=p.slice(0,sz)}
  }
  if(!p.length){alert("无题");return}
  MD=String(m);CR={};Q=p;I=0;document.getElementById("mArea").style.display="none";document.getElementById("qa").style.display="block";sq();
}

function ext(){
  var c=0;Q.forEach(function(x){if(x._ok)c++});
  if(Q.length>0&&c>0){H.push({md:MD,t:Q.length,c:c,d:new Date().toISOString().slice(0,10)});if(H.length>30)H.shift();try{localStorage.setItem("_his"+U,JSON.stringify(H))}catch(e){}}
  Q=[];I=0;C=null;document.getElementById("mArea").style.display="block";document.getElementById("qa").style.display="none";rd();
}

function imgs(q){if(!q.imgs||!q.imgs.length)return"";var h="";q.imgs.forEach(function(b){h+='<img src="'+b+'" class="qimg">'});return h}

function sq(){
  if(I>=Q.length){var c=0;Q.forEach(function(x){if(x._ok)c++});alert("完成！"+Q.length+"题，正确"+c+"题("+Math.round(c/Q.length*100)+"%)");ext();return}
  C=Q[I];var q=C;
  var tc=TY[''+q.type]||'c';
  var h='<div style="margin-bottom:8px;display:flex;gap:8px"><button class="btn bo" onclick="ext()" style="flex:none;padding:8px 16px">← 退出</button><button class="btn bo" onclick="regen()" style="flex:none;padding:8px 16px;color:#d97706">换一套</button></div><div class="qw"><div class="qm"><span><span class="qt qt'+tc+'">'+TN[q.type]+'</span><span style="margin-left:8px">'+q.ch+'</span></span><span>'+(I+1)+'/'+Q.length+'</span></div><div class="qtx">'+(I+1)+'. '+es(q.q)+'</div>'+imgs(q);
